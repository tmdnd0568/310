<!DOCTYPE html>
<html lang="ko">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>더치톡</title>
<!-- 모바일 웹앱 설정 -->
<meta name="theme-color" content="#7C3AED">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="더치페이계산기">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- 파비콘 / 앱 아이콘 -->
<link rel="icon" href="log.png">
<link rel="apple-touch-icon" href="log.png">




<style>
  :root{
    --glass-bg: rgba(255,255,255,0.10);
    --glass-bg-strong: rgba(255,255,255,0.16);
    --glass-border: rgba(255,255,255,0.28);
    --glass-highlight: rgba(255,255,255,0.55);
    --purple-glow: rgba(139,124,255,0.35);
    --blue-glow: rgba(90,150,255,0.30);
    --gold: #f4d58d;
    --gold-soft: #e9c877;
    --text-main: #f5f6fa;
    --text-sub: rgba(245,246,255,0.62);
    --navy-deep: #060a1a;
    --navy-mid: #0b1330;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    color:var(--text-main);
    overflow-x:hidden;
  }

  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 20% -10%, rgba(120,100,255,0.25), transparent 55%),
      radial-gradient(ellipse at 90% 10%, rgba(70,140,255,0.18), transparent 50%),
      linear-gradient(180deg, var(--navy-deep) 0%, var(--navy-mid) 45%, #0a0f26 100%);
    position:relative;
  }

  /* ---------- Money Rain Background ---------- */
  #money-rain{
    position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
  }
  .money-obj{
    position:absolute;
    top:-10%;
    will-change:transform, opacity;
    filter:drop-shadow(0 6px 10px rgba(0,0,0,0.35));
    animation-name: fall, sway;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
  }
  .money-obj.blur{ filter: blur(1.5px) drop-shadow(0 6px 10px rgba(0,0,0,0.3)); opacity:0.55; }
  @keyframes fall{
    0%{ transform: translateY(-15vh) rotate(0deg); }
    100%{ transform: translateY(115vh) rotate(360deg); }
  }
  @keyframes sway{
    0%,100%{ margin-left:-18px; }
    50%{ margin-left:18px; }
  }

  /* ---------- Layout ---------- */
  .app{
    position:relative; z-index:1;
    max-width:460px; margin:0 auto;
    min-height:100vh;
    padding:28px 18px 46px;
    display:flex; flex-direction:column; gap:18px;
  }

  /* ---------- Header ---------- */
  .header{ text-align:center; padding:10px 0 4px; }
  .logo-badge{
    width:64px; height:64px; margin:0 auto 12px;
    border-radius:22px;
    background: linear-gradient(145deg, rgba(255,255,255,0.35), rgba(255,255,255,0.06));
    border:1px solid var(--glass-border);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    display:flex; align-items:center; justify-content:center;
    font-size:30px;
    box-shadow: 0 8px 24px var(--purple-glow), inset 0 1px 1px rgba(255,255,255,0.5);
  }
  .app-title{
    font-size:26px; font-weight:800; letter-spacing:-0.5px;
    background: linear-gradient(135deg, #ffffff 20%, #cfd6ff 60%, var(--gold) 120%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin:0 0 6px;
  }
  .app-sub{ font-size:13px; color:var(--text-sub); font-weight:500; margin:0; letter-spacing:0.2px; }

  /* ---------- Glass Card base ---------- */
  .glass-card{
    background: var(--glass-bg);
    border:1px solid var(--glass-border);
    border-radius:26px;
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    box-shadow:
      0 10px 30px rgba(10,10,40,0.35),
      inset 0 1px 0 rgba(255,255,255,0.35),
      inset 0 -1px 12px rgba(120,100,255,0.06);
    padding:20px;
    position:relative;
    overflow:hidden;
  }
  .glass-card::before{
    content:"";
    position:absolute; top:-40%; left:-20%;
    width:70%; height:70%;
    background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%);
    pointer-events:none;
  }

  .card-title{
    font-size:13px; font-weight:700; color:var(--text-sub);
    display:flex; align-items:center; gap:6px;
    margin:0 0 14px; letter-spacing:0.3px; text-transform:uppercase;
  }

  /* ---------- Inputs ---------- */
  .field{ margin-bottom:14px; }
  .field:last-child{ margin-bottom:0; }
  .field label{
    display:block; font-size:12.5px; font-weight:600; color:var(--text-sub);
    margin-bottom:7px; padding-left:2px;
  }
  .input-wrap{
    display:flex; align-items:center;
    background: rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.20);
    border-radius:16px;
    padding:2px 4px;
    transition: box-shadow .25s ease, border-color .25s ease, background .25s ease;
  }
  .input-wrap:focus-within{
    border-color: rgba(180,170,255,0.65);
    background: rgba(255,255,255,0.11);
    box-shadow: 0 0 0 4px rgba(139,124,255,0.16), 0 4px 16px rgba(90,150,255,0.15);
  }
  .input-wrap input{
    flex:1; min-width:0;
    background:transparent; border:none; outline:none;
    color:var(--text-main);
    font-size:16px; font-weight:600;
    padding:13px 6px 13px 14px;
    letter-spacing:0.2px;
  }
  .input-wrap input::placeholder{ color:rgba(245,246,255,0.34); font-weight:500; }
  .input-suffix{
    font-size:13px; font-weight:700; color:var(--text-sub);
    padding-right:14px; white-space:nowrap;
  }
  .stepper{ display:flex; gap:6px; padding-right:6px; }
  .stepper button{
    width:32px; height:32px; border-radius:10px; border:1px solid rgba(255,255,255,0.22);
    background:rgba(255,255,255,0.08); color:var(--text-main); font-size:17px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .stepper button:active{ transform: scale(0.92); background:rgba(255,255,255,0.18); }

  .hint{ font-size:11.5px; color:rgba(245,246,255,0.4); margin-top:6px; padding-left:2px; }

  .inline-copy-btn{
    flex-shrink:0;
    width:38px; height:38px; margin-right:5px;
    border-radius:12px; border:1px solid rgba(255,255,255,0.20);
    background:rgba(255,255,255,0.08);
    color:var(--text-main);
    font-size:15px;
    display:flex; align-items:center; justify-content:center;
    transition: transform .15s ease, background .2s ease, box-shadow .2s ease;
  }
  .inline-copy-btn:active{ transform:scale(0.9); background:rgba(255,255,255,0.18); }
  .inline-copy-btn.copied{
    background: linear-gradient(135deg, rgba(244,213,141,0.9), rgba(233,200,119,0.9));
    color:#1a1030;
    box-shadow: 0 4px 14px rgba(244,213,141,0.35);
  }

  /* ---------- Buttons ---------- */
  .btn-stack{ display:flex; flex-direction:column; gap:12px; }
  .btn{
    position:relative;
    border:none; cursor:pointer;
    border-radius:999px;
    font-family:inherit;
    font-weight:700;
    letter-spacing:0.2px;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition: transform .15s ease, box-shadow .25s ease, opacity .2s ease;
    -webkit-user-select:none; user-select:none;
  }
  .btn:active{ transform: scale(0.97); }

  .btn-primary{
    height:58px; font-size:17px;
    color:#1a1030;
    background: linear-gradient(135deg, #ffffff 0%, #f1eaff 45%, var(--gold) 130%);
    box-shadow: 0 12px 28px rgba(244,213,141,0.28), 0 6px 18px var(--purple-glow), inset 0 1px 1px rgba(255,255,255,0.8);
  }
  .btn-primary:active{ box-shadow: 0 6px 14px rgba(244,213,141,0.25); }

  .btn-row{ display:flex; gap:10px; }
  .btn-glass{
    flex:1; height:50px; font-size:14.5px;
    color:var(--text-main);
    background: var(--glass-bg-strong);
    border:1px solid var(--glass-border);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 6px 18px rgba(10,10,40,0.25), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .btn-glass.danger{ color:#ffd9d9; }
  .btn-glass:disabled, .btn-primary:disabled{ opacity:0.4; pointer-events:none; }

  .icon{ font-size:16px; line-height:1; }

  /* ---------- Result Card ---------- */
  .result-card{ display:none; text-align:center; padding:26px 20px; }
  .result-card.show{ display:block; animation: pop .4s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes pop{ from{ opacity:0; transform:translateY(8px) scale(0.97);} to{opacity:1; transform:translateY(0) scale(1);} }

  .result-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:9px 4px; font-size:13.5px; color:var(--text-sub);
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .result-row span:last-child{ color:var(--text-main); font-weight:700; }
  .result-main{
    margin-top:18px; padding-top:14px;
  }
  .result-main-label{ font-size:12.5px; color:var(--text-sub); font-weight:600; letter-spacing:0.3px; }
  .result-main-value{
    font-size:40px; font-weight:800; margin-top:8px;
    background: linear-gradient(135deg, #ffffff 10%, var(--gold-soft) 90%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:-1px;
    text-shadow: 0 0 30px rgba(244,213,141,0.25);
  }
  .result-main-value sub{ font-size:17px; font-weight:700; color:var(--text-sub); -webkit-text-fill-color:var(--text-sub); }

  /* ---------- Share Message Card ---------- */
  .msg-card{ display:none; }
  .msg-card.show{ display:block; animation: pop .4s cubic-bezier(.2,.9,.3,1.2); }
  .msg-box{
    background: rgba(0,0,0,0.22);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:18px;
    padding:16px 16px;
    font-size:13.5px; line-height:1.75;
    color:rgba(245,246,255,0.9);
    white-space:pre-wrap;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
  }

  .toast{
    position:fixed; left:50%; bottom:36px; transform:translateX(-50%) translateY(20px);
    background:rgba(20,20,35,0.92); color:#fff; border:1px solid rgba(255,255,255,0.15);
    padding:12px 20px; border-radius:999px; font-size:13.5px; font-weight:600;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    opacity:0; pointer-events:none; transition: all .3s ease; z-index:50;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .footer-note{ text-align:center; font-size:11px; color:rgba(245,246,255,0.28); padding-top:6px; }

  /* ---------------- 링크 표시 영역 ---------------- */
  .link-row{
    display:none;
    align-items:center;
    gap:8px;
    margin-top:12px;
    background: rgba(0,0,0,0.22);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:16px;
    padding:6px 6px 6px 14px;
  }
  .link-row.show{ display:flex; }
  .link-row input{
    flex:1; min-width:0;
    background:transparent; border:none; outline:none;
    color:rgba(245,246,255,0.85);
    font-size:12.5px;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
  }

  /* ---------------- 수동 복사 모달 ---------------- */
  .copy-modal-overlay{
    display:none;
    position:fixed; inset:0; z-index:80;
    background: rgba(6,10,26,0.68);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    align-items:center; justify-content:center;
    padding:24px;
  }
  .copy-modal-overlay.show{ display:flex; }
  .copy-modal{
    width:100%; max-width:380px;
    animation: pop .3s cubic-bezier(.2,.9,.3,1.2);
  }
  #manualCopyText{
    width:100%; min-height:150px;
    resize:none;
    background: rgba(0,0,0,0.28);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:14px;
    color:var(--text-main);
    font-size:13px;
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    line-height:1.7;
    padding:12px 14px;
    outline:none;
  }
</style>
</head>
<body>

<div id="money-rain"></div>

<div class="app">

  <div class="header">
    <div class="logo-badge">💸</div>
    <h1 class="app-title">더치톡</h1>
    <p class="app-sub">10초 만에 끝내는 스마트 정산</p>
  </div>

  <!-- 입력 카드: 금액/인원 -->
  <div class="glass-card">
    <p class="card-title">💰 정산 정보</p>
    <div class="field">
      <label for="totalAmount">총 결제 금액</label>
      <div class="input-wrap">
        <input id="totalAmount" type="text" inputmode="numeric" placeholder="예: 120000">
        <span class="input-suffix">원</span>
      </div>
    </div>
    <div class="field">
      <label for="peopleCount">인원 수 (최대 10명)</label>
      <div class="input-wrap">
        <input id="peopleCount" type="text" inputmode="numeric" placeholder="예: 4" maxlength="2">
        <div class="stepper">
          <button type="button" id="minusBtn">−</button>
          <button type="button" id="plusBtn">＋</button>
        </div>
      </div>
      <p class="hint">1명부터 10명까지 입력할 수 있어요</p>
    </div>
  </div>

  <!-- 입력 카드: 계좌정보 -->
  <div class="glass-card">
    <p class="card-title">🏦 입금 계좌</p>
    <div class="field">
      <label for="bankName">은행명</label>
      <div class="input-wrap">
        <input id="bankName" type="text" placeholder="예: 국민은행">
      </div>
    </div>
    <div class="field">
      <label for="accountNumber">계좌번호</label>
      <div class="input-wrap">
        <input id="accountNumber" type="text" inputmode="numeric" placeholder="예: 123-456-789012">
        <button type="button" class="inline-copy-btn" id="copyAccountBtn" aria-label="계좌번호 복사">📋</button>
      </div>
    </div>
    <div class="field">
      <label for="accountHolder">예금주</label>
      <div class="input-wrap">
        <input id="accountHolder" type="text" placeholder="예: 홍길동">
      </div>
    </div>
  </div>

  <!-- 버튼 영역 -->
  <div class="btn-stack">
    <button class="btn btn-primary" id="calcBtn">
      <span class="icon">🧮</span> 계산하기
    </button>
    <div class="btn-row">
      <button class="btn btn-glass" id="copyBtn" disabled>
        <span class="icon">📋</span> 복사하기
      </button>
      <button class="btn btn-glass" id="shareBtn" disabled>
        <span class="icon">📤</span> 공유하기
      </button>
    </div>
    <button class="btn btn-glass danger" id="resetBtn">
      <span class="icon">🔄</span> 초기화
    </button>
  </div>

  <!-- 결과 카드 -->
  <div class="glass-card result-card" id="resultCard">
    <p class="card-title" style="text-align:left;">📊 정산 결과</p>
    <div class="result-row"><span>총 금액</span><span id="resTotal">-</span></div>
    <div class="result-row"><span>참여 인원</span><span id="resPeople">-</span></div>
    <div class="result-main">
      <div class="result-main-label">1인당 입금 금액</div>
      <div class="result-main-value" id="resPerPerson">0<sub>원</sub></div>
    </div>
  </div>

  <!-- 공유 메시지 카드 -->
  <div class="glass-card msg-card" id="msgCard">
    <p class="card-title">💬 공유 메시지</p>
    <div class="msg-box" id="msgBox"></div>
    <div class="link-row" id="linkRow">
      <input type="text" id="linkInput" readonly>
      <button type="button" class="inline-copy-btn" id="copyLinkBtn" aria-label="링크 복사">📋</button>
    </div>
    <p class="hint" id="linkHint" style="display:none;">이 링크를 열면 정산 결과가 바로 보여요</p>
  </div>

  <p class="footer-note">더치톡 · 친구들과 깔끔하게, 정산은 더치톡</p>
</div>

<div class="toast" id="toast"></div>

<!-- 수동 복사 모달 (클립보드 API가 막힌 환경 대비) -->
<div class="copy-modal-overlay" id="copyModalOverlay">
  <div class="copy-modal glass-card">
    <p class="card-title" style="text-align:left;">✋ 직접 복사해 주세요</p>
    <p class="hint" style="margin-bottom:10px;">이 기기에서는 자동 복사가 제한돼요. 아래 텍스트를 길게 눌러 전체 선택 후 복사해 주세요.</p>
    <textarea id="manualCopyText" readonly></textarea>
    <button type="button" class="btn btn-primary" id="closeCopyModalBtn" style="height:48px; font-size:15px; margin-top:14px;">확인</button>
  </div>
</div>

<script>
  // 서버(doGet)에서 전달한 배포 URL (공유 링크 생성용)
  const BASE_URL = "<?= baseUrl ?>";

  /* ---------------- 머니레인 배경 ---------------- */
  (function initMoneyRain(){
    const container = document.getElementById('money-rain');
    const symbols = ['💵','💴','💶','💷','🪙','💰'];
    const count = 26;
    for(let i=0;i<count;i++){
      const el = document.createElement('div');
      const isBlur = Math.random() < 0.4;
      el.className = 'money-obj' + (isBlur ? ' blur' : '');
      el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
      const size = 16 + Math.random()*22;
      const left = Math.random()*100;
      const fallDur = 9 + Math.random()*10;
      const swayDur = 2.5 + Math.random()*2.5;
      const delay = -Math.random()*fallDur;
      el.style.left = left + 'vw';
      el.style.fontSize = size + 'px';
      el.style.animationDuration = fallDur + 's, ' + swayDur + 's';
      el.style.animationDelay = delay + 's, ' + (Math.random()*2) + 's';
      container.appendChild(el);
    }
  })();

  /* ---------------- 유틸 ---------------- */
  function onlyDigits(str){ return (str || '').replace(/[^0-9]/g, ''); }
  function formatComma(numStr){
    if(!numStr) return '';
    return numStr.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }
  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(()=> t.classList.remove('show'), 1800);
  }

  /* ---------------- 요소 참조 ---------------- */
  const totalAmountEl = document.getElementById('totalAmount');
  const peopleCountEl = document.getElementById('peopleCount');
  const bankNameEl = document.getElementById('bankName');
  const accountNumberEl = document.getElementById('accountNumber');
  const accountHolderEl = document.getElementById('accountHolder');

  const calcBtn = document.getElementById('calcBtn');
  const copyBtn = document.getElementById('copyBtn');
  const shareBtn = document.getElementById('shareBtn');
  const resetBtn = document.getElementById('resetBtn');
  const minusBtn = document.getElementById('minusBtn');
  const plusBtn = document.getElementById('plusBtn');

  const resultCard = document.getElementById('resultCard');
  const msgCard = document.getElementById('msgCard');
  const resTotal = document.getElementById('resTotal');
  const resPeople = document.getElementById('resPeople');
  const resPerPerson = document.getElementById('resPerPerson');
  const msgBox = document.getElementById('msgBox');

  let generatedMessage = '';
  let lastCalc = null; // { total, people, bank, account, holder, perPerson }

  /* ---------------- 입력 포맷팅 ---------------- */
  totalAmountEl.addEventListener('input', () => {
    const digits = onlyDigits(totalAmountEl.value).slice(0, 12);
    totalAmountEl.value = formatComma(digits);
  });

  peopleCountEl.addEventListener('input', () => {
    let digits = onlyDigits(peopleCountEl.value);
    if(digits.length > 0){
      let n = parseInt(digits, 10);
      if(n > 10) n = 10;
      if(n < 0) n = 0;
      digits = String(n);
    }
    peopleCountEl.value = digits;
  });

  minusBtn.addEventListener('click', () => {
    let n = parseInt(onlyDigits(peopleCountEl.value) || '0', 10);
    n = Math.max(1, n - 1);
    peopleCountEl.value = String(n);
  });
  plusBtn.addEventListener('click', () => {
    let n = parseInt(onlyDigits(peopleCountEl.value) || '0', 10);
    n = Math.min(10, n + 1);
    peopleCountEl.value = String(n);
  });

  accountNumberEl.addEventListener('input', () => {
    // 숫자와 하이픈만 허용
    accountNumberEl.value = accountNumberEl.value.replace(/[^0-9-]/g, '');
  });

  /* ---------------- 계산 로직 (버튼 클릭 + 링크로 접속 시 공용) ---------------- */
  function calculate(){
    const totalDigits = onlyDigits(totalAmountEl.value);
    const peopleDigits = onlyDigits(peopleCountEl.value);

    if(!totalDigits || parseInt(totalDigits, 10) <= 0){
      showToast('총 결제 금액을 입력해 주세요');
      totalAmountEl.focus();
      return false;
    }
    let people = parseInt(peopleDigits || '0', 10);
    if(!people || people < 1){
      showToast('인원 수를 입력해 주세요 (1~10명)');
      peopleCountEl.focus();
      return false;
    }
    if(people > 10) people = 10;

    const total = parseInt(totalDigits, 10);
    const perPerson = Math.round(total / people);

    resTotal.textContent = formatComma(String(total)) + '원';
    resPeople.textContent = people + '명';
    resPerPerson.innerHTML = formatComma(String(perPerson)) + '<sub>원</sub>';
    resultCard.classList.add('show');

    // 계좌 정보 (선택 입력)
    const bank = bankNameEl.value.trim();
    const account = accountNumberEl.value.trim();
    const holder = accountHolderEl.value.trim();

    let accountBlock = '';
    if(bank || account || holder){
      accountBlock = '\n입금 계좌\n' +
        (bank ? bank + '\n' : '') +
        (account ? account + '\n' : '') +
        (holder ? holder : '');
      accountBlock = accountBlock.replace(/\n$/, '');
    }

    generatedMessage =
      '💳 더치페이 정산 안내\n\n' +
      '총 금액 : ' + formatComma(String(total)) + '원\n' +
      '참여 인원 : ' + people + '명\n\n' +
      '1인당 입금 금액\n' +
      formatComma(String(perPerson)) + '원' +
      (accountBlock ? '\n' + accountBlock : '');

    msgBox.textContent = generatedMessage;
    msgCard.classList.add('show');

    lastCalc = { total, people, bank, account, holder, perPerson };

    copyBtn.disabled = false;
    shareBtn.disabled = false;

    // 새로 계산하면 이전에 만들어둔 링크는 감춤 (링크는 공유하기 버튼으로 다시 생성)
    document.getElementById('linkRow').classList.remove('show');
    document.getElementById('linkHint').style.display = 'none';

    return true;
  }

  calcBtn.addEventListener('click', () => {
    const ok = calculate();
    if(ok){
      resultCard.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }
  });

  /* ---------------- 수동 복사 모달 ---------------- */
  const copyModalOverlay = document.getElementById('copyModalOverlay');
  const manualCopyText = document.getElementById('manualCopyText');
  const closeCopyModalBtn = document.getElementById('closeCopyModalBtn');

  function openManualCopyModal(text){
    manualCopyText.value = text;
    copyModalOverlay.classList.add('show');
    // 살짝 지연 후 자동 선택 (모바일에서 바로 길게 눌러 복사 메뉴가 뜨도록)
    setTimeout(() => {
      manualCopyText.focus();
      manualCopyText.setSelectionRange(0, text.length);
    }, 150);
  }
  closeCopyModalBtn.addEventListener('click', () => {
    copyModalOverlay.classList.remove('show');
  });
  copyModalOverlay.addEventListener('click', (e) => {
    if(e.target === copyModalOverlay) copyModalOverlay.classList.remove('show');
  });

  /* ---------------- 공용 복사 함수 (다단계 폴백) ---------------- */
  // 1) navigator.clipboard  2) execCommand('copy')  3) 실패 시 수동 복사 모달 오픈
  async function copyText(text, opts){
    opts = opts || {};
    if(!text) return false;

    // 1단계: Clipboard API
    try{
      if(window.isSecureContext && navigator.clipboard && navigator.clipboard.writeText){
        await navigator.clipboard.writeText(text);
        return true;
      }
    } catch(e){ /* 다음 단계로 진행 */ }

    // 2단계: execCommand 폴백
    try{
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.top = '0';
      ta.style.left = '0';
      ta.style.opacity = '0';
      ta.style.pointerEvents = 'none';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, text.length);
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if(ok) return true;
    } catch(e){ /* 다음 단계로 진행 */ }

    // 3단계: 자동 복사가 막힌 환경 → 수동 복사 모달 제공
    if(!opts.silentFallback){
      openManualCopyModal(text);
    }
    return false;
  }

  /* ---------------- 복사하기 (정산 메시지 전체) ---------------- */
  copyBtn.addEventListener('click', async () => {
    if(!generatedMessage) return;
    const ok = await copyText(generatedMessage);
    if(ok) showToast('정산 메시지를 복사했어요 ✅');
    // 실패 시 copyText 내부에서 수동 복사 모달이 자동으로 열림
  });

  /* ---------------- 계좌번호만 복사 ---------------- */
  const copyAccountBtn = document.getElementById('copyAccountBtn');
  copyAccountBtn.addEventListener('click', async () => {
    const accountValue = accountNumberEl.value.trim();
    if(!accountValue){
      showToast('계좌번호를 먼저 입력해 주세요');
      accountNumberEl.focus();
      return;
    }
    const ok = await copyText(accountValue);
    if(ok){
      showToast('계좌번호를 복사했어요 ✅');
      copyAccountBtn.classList.add('copied');
      copyAccountBtn.textContent = '✅';
      setTimeout(() => {
        copyAccountBtn.classList.remove('copied');
        copyAccountBtn.textContent = '📋';
      }, 1200);
    }
  });

  /* ---------------- 공유 링크 생성 ---------------- */
  function buildShareLink(){
    if(!lastCalc || !BASE_URL) return '';
    const params = new URLSearchParams();
    params.set('total', String(lastCalc.total));
    params.set('people', String(lastCalc.people));
    if(lastCalc.bank) params.set('bank', lastCalc.bank);
    if(lastCalc.account) params.set('account', lastCalc.account);
    if(lastCalc.holder) params.set('holder', lastCalc.holder);
    return BASE_URL + '?' + params.toString();
  }

  /* ---------------- 공유하기: 링크 생성 후 공유/복사 ---------------- */
  const linkRow = document.getElementById('linkRow');
  const linkInput = document.getElementById('linkInput');
  const linkHint = document.getElementById('linkHint');
  const copyLinkBtn = document.getElementById('copyLinkBtn');

  shareBtn.addEventListener('click', async () => {
    if(!generatedMessage || !lastCalc) return;

    const link = buildShareLink();

    if(link){
      // 링크를 화면에 표시해 언제든 다시 복사할 수 있게 함
      linkInput.value = link;
      linkRow.classList.add('show');
      linkHint.style.display = 'block';
    }

    if(navigator.share){
      try{
        if(link){
          await navigator.share({
            title: '더치톡 정산 안내',
            text: '더치페이 정산 결과를 확인해 주세요 👇',
            url: link
          });
        } else {
          // 배포 URL을 가져오지 못한 경우(로컬 테스트 등) 텍스트로 대체 공유
          await navigator.share({ title: '더치톡 정산 안내', text: generatedMessage });
        }
      } catch(e){
        // 사용자가 공유창을 취소한 경우는 무시
      }
    } else if(link){
      const ok = await copyText(link);
      if(ok) showToast('공유 링크를 복사했어요 🔗');
    } else {
      const ok = await copyText(generatedMessage);
      if(ok) showToast('공유 기능 미지원 기기예요. 메시지를 복사했어요 📋');
    }
  });

  copyLinkBtn.addEventListener('click', async () => {
    const link = linkInput.value.trim();
    if(!link) return;
    const ok = await copyText(link);
    if(ok){
      showToast('링크를 복사했어요 ✅');
      copyLinkBtn.classList.add('copied');
      copyLinkBtn.textContent = '✅';
      setTimeout(() => {
        copyLinkBtn.classList.remove('copied');
        copyLinkBtn.textContent = '📋';
      }, 1200);
    }
  });

  /* ---------------- 초기화 ---------------- */
  resetBtn.addEventListener('click', () => {
    totalAmountEl.value = '';
    peopleCountEl.value = '';
    bankNameEl.value = '';
    accountNumberEl.value = '';
    accountHolderEl.value = '';

    resultCard.classList.remove('show');
    msgCard.classList.remove('show');
    resTotal.textContent = '-';
    resPeople.textContent = '-';
    resPerPerson.innerHTML = '0<sub>원</sub>';
    msgBox.textContent = '';
    generatedMessage = '';
    lastCalc = null;

    linkRow.classList.remove('show');
    linkHint.style.display = 'none';
    linkInput.value = '';

    copyBtn.disabled = true;
    shareBtn.disabled = true;

    showToast('모든 입력이 초기화됐어요');
    totalAmountEl.focus();
  });

  /* Enter 키로 계산 실행 */
  [totalAmountEl, peopleCountEl, bankNameEl, accountNumberEl, accountHolderEl].forEach(el => {
    el.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){
        e.preventDefault();
        calcBtn.click();
      }
    });
  });

  /* ---------------- 공유 링크로 접속한 경우: URL 파라미터 자동 반영 ---------------- */
  (function loadFromUrlParams(){
    const params = new URLSearchParams(window.location.search);
    if(!params.has('total') || !params.has('people')) return;

    const total = onlyDigits(params.get('total'));
    const people = onlyDigits(params.get('people'));
    if(!total || !people) return;

    totalAmountEl.value = formatComma(total);
    peopleCountEl.value = people;
    if(params.get('bank')) bankNameEl.value = params.get('bank');
    if(params.get('account')) accountNumberEl.value = params.get('account');
    if(params.get('holder')) accountHolderEl.value = params.get('holder');

    calculate();
    showToast('공유받은 정산 내역을 불러왔어요 📥');
  })();
</script>

</body>
</html>
